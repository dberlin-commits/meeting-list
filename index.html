<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jews in Recovery - Meeting Directory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fff;
    color: #333;
    line-height: 1.5;
  }

  .container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* --- Filter Card --- */
  .filter-card {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 24px;
    background: #fff;
  }

  .filter-card-label {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 12px;
  }

  .quick-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }

  .quick-btn {
    flex: 1;
    min-width: 150px;
    padding: 12px 20px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    text-align: center;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .quick-btn:hover { border-color: #1a3a6b; color: #1a3a6b; }
  .quick-btn.active { background: #1a3a6b; color: #fff; border-color: #1a3a6b; }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }

  .filter-group { flex: 1; min-width: 180px; }
  .filter-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }

  .filter-group select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    font-size: 14px;
    background: #fff;
    color: #333;
    appearance: auto;
  }

  .filter-actions {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    padding-bottom: 1px;
  }

  .btn {
    padding: 9px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary { background: #1a3a6b; color: #fff; }
  .btn-primary:hover { background: #152f57; }
  .btn-outline { background: #fff; color: #555; border: 1px solid #d0d5dd; }
  .btn-outline:hover { border-color: #999; }

  /* --- Results bar --- */
  .results-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .result-count {
    font-size: 14px;
    color: #555;
    font-weight: 500;
  }

  .sort-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #555;
  }

  .sort-controls label { font-weight: 600; }

  .sort-select {
    padding: 5px 10px;
    border: 1px solid #d0d5dd;
    border-radius: 5px;
    font-size: 13px;
    background: #fff;
    color: #333;
  }

  /* --- Table --- */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
  }

  thead th {
    background: #f7f8fa;
    padding: 12px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: #666;
    border-bottom: 1px solid #e0e0e0;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: #1a3a6b; }

  tbody tr {
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.1s;
  }

  tbody tr:hover { background: #f9fafb; }
  tbody tr:last-child td { border-bottom: none; }

  tbody td {
    padding: 12px 16px;
    font-size: 14px;
    vertical-align: middle;
    border-bottom: 1px solid #f0f0f0;
  }

  td.title-cell {
    font-weight: 600;
    color: #1a1a1a;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* --- Badges --- */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .town-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; display: inline-block; }
  .town-israel { background: #dbeafe; color: #1e40af; }
  .town-monsey { background: #fce7f3; color: #9d174d; }
  .town-brooklyn { background: #dbeafe; color: #1e3a5f; }
  .town-lakewood { background: #dcfce7; color: #166534; }
  .town-online { background: #e0e7ff; color: #3730a3; }
  .town-williamsburg { background: #fef3c7; color: #92400e; }
  .town-chicago { background: #d1fae5; color: #065f46; }
  .town-five-towns { background: #fce7f3; color: #831843; }
  .town-new-jersey { background: #fee2e2; color: #991b1b; }
  .town-florida { background: #fef3c7; color: #78350f; }
  .town-houston { background: #e0e7ff; color: #3730a3; }
  .town-crown-heights { background: #dbeafe; color: #1e40af; }
  .town-default { background: #f3f4f6; color: #374151; }

  .fellowship-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; display: inline-block; }
  .fell-sa { background: #fee2e2; color: #991b1b; }
  .fell-aa { background: #dbeafe; color: #1e40af; }
  .fell-na { background: #e0e7ff; color: #3730a3; }
  .fell-ga { background: #fef3c7; color: #92400e; }
  .fell-alanon { background: #dcfce7; color: #166534; }
  .fell-aca { background: #fce7f3; color: #9d174d; }
  .fell-tlr { background: #dbeafe; color: #1e3a5f; }
  .fell-recovery { background: #f3e8ff; color: #6b21a8; }
  .fell-sanon { background: #fef3c7; color: #78350f; }
  .fell-ma { background: #e0e7ff; color: #312e81; }
  .fell-saa { background: #fee2e2; color: #7f1d1d; }
  .fell-alateen { background: #ccfbf1; color: #115e59; }
  .fell-default { background: #f3f4f6; color: #374151; }

  .type-text { font-size: 13px; color: #555; }

  /* --- Details Button --- */
  .details-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border: 1px solid #1a3a6b;
    border-radius: 6px;
    background: transparent;
    color: #1a3a6b;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .details-btn:hover { background: #1a3a6b; color: #fff; }

  .details-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  /* --- Modal --- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal-overlay.open { display: flex; }

  body.modal-open { overflow: hidden; }

  .modal {
    background: #fff;
    border-radius: 12px;
    max-width: 540px;
    width: 100%;
    border: 1px solid #ccc;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    animation: modalIn 0.2s ease;
    display: flex;
    flex-direction: column;
    max-height: 85vh;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-header {
    padding: 22px 24px 16px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .modal-header h2 { font-size: 19px; color: #1a1a1a; padding-right: 16px; line-height: 1.3; }

  .modal-close {
    background: none;
    border: none;
    font-size: 26px;
    cursor: pointer;
    color: #999;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .modal-close:hover { background: #f3f4f6; color: #333; }

  .modal-footer {
    padding: 14px 24px;
    border-top: 1px solid #eee;
    flex-shrink: 0;
    text-align: right;
  }

  .modal-close-btn {
    padding: 8px 24px;
    border: 1px solid #1a3a6b;
    border-radius: 6px;
    background: #1a3a6b;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .modal-close-btn:hover { background: #152f57; }

  .modal-body {
    padding: 20px 24px 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal-field { margin-bottom: 16px; }
  .modal-field:last-child { margin-bottom: 0; }
  .modal-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: 4px; }
  .modal-value { font-size: 15px; color: #333; line-height: 1.5; word-break: break-word; }
  .modal-value a { color: #1a3a6b; text-decoration: none; font-weight: 500; }
  .modal-value a:hover { text-decoration: underline; }

  /* --- Loading --- */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #888;
    font-size: 15px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #e5e7eb;
    border-top-color: #1a3a6b;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Mobile Cards --- */
  .mobile-cards { display: none; }

  .meeting-card {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    background: #fff;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }

  .meeting-card:active { box-shadow: 0 0 0 2px #1a3a6b33; }

  .card-title {
    font-weight: 600;
    font-size: 15px;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .card-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }

  .card-day { font-size: 13px; color: #555; font-weight: 500; }
  .card-time { font-size: 13px; color: #888; }
  .card-type { font-size: 12px; color: #666; margin-top: 2px; }

  .card-details-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    padding: 5px 12px;
    border: 1px solid #1a3a6b;
    border-radius: 5px;
    background: transparent;
    color: #1a3a6b;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  /* --- Responsive --- */
  @media (max-width: 700px) {
    .container { padding: 14px 12px; }
    .filter-card { padding: 14px 16px; }
    .filter-group { min-width: 100%; }
    .filter-actions { width: 100%; }
    .filter-actions .btn { flex: 1; }
    .quick-filters { flex-direction: column; gap: 8px; }
    .quick-btn { min-width: 0; padding: 12px 16px; font-size: 14px; }
    .results-bar { flex-direction: column; align-items: flex-start; gap: 6px; }
    .table-wrap { display: none; }
    .mobile-cards { display: block; }
    .modal-overlay { padding: 12px; }
    .modal { border-radius: 10px; max-width: 100%; max-height: 90vh; }
    .modal-header { padding: 16px 18px 12px; position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 10px 10px 0 0; }
    .modal-header h2 { font-size: 17px; }
    .modal-body { padding: 16px 18px 16px; overflow-y: auto; }
    .modal-footer { padding: 12px 18px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Filter Card -->
  <div class="filter-card">
    <div class="filter-card-label">Quick Filters</div>
    <div class="quick-filters">
      <button class="quick-btn" data-town="Lakewood">Lakewood Area</button>
      <button class="quick-btn" data-town="Brooklyn">Brooklyn</button>
      <button class="quick-btn" data-town="Monsey">Monsey Area</button>
    </div>

    <div class="filter-row">
      <div class="filter-group">
        <label>Town</label>
        <select id="filterTown" multiple size="1"><option value="">All Towns</option></select>
      </div>
      <div class="filter-group">
        <label>Fellowship</label>
        <select id="filterFellowship" multiple size="1"><option value="">All Fellowships</option></select>
      </div>
      <div class="filter-group">
        <label>Day of Week</label>
        <select id="filterDay" multiple size="1"><option value="">All Days</option></select>
      </div>
      <div class="filter-actions">
        <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
        <button class="btn btn-outline" onclick="clearFilters()">Clear Filters</button>
      </div>
    </div>
  </div>

  <!-- Results Bar -->
  <div class="results-bar">
    <span class="result-count" id="resultCount">Loading...</span>
    <div class="sort-controls">
      <label>Sort by:</label>
      <select class="sort-select" id="sortSelect">
        <option value="day">Day of Week</option>
        <option value="town">Town</option>
        <option value="fellowship">Fellowship</option>
        <option value="title">Title</option>
      </select>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Loading meetings...
    </div>
    <table id="meetingTable" style="display:none">
      <thead>
        <tr>
          <th data-sort="title">TITLE</th>
          <th data-sort="town">TOWN</th>
          <th data-sort="fellowship">FELLOWSHIP</th>
          <th data-sort="day">DAY &#x2193;</th>
          <th data-sort="type">TYPE</th>
          <th>DETAILS</th>
        </tr>
      </thead>
      <tbody id="meetingBody"></tbody>
    </table>
  </div>

  <!-- Mobile Card View -->
  <div class="mobile-cards" id="mobileCards"></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="modal-close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1y8RXDyQPivRd9asvYtItHU-bx4Q7aIefP5it7hU0R8Q';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;

let allMeetings = [];
let filteredMeetings = [];
let currentSort = 'day';
let sortAsc = true;

const DAY_ORDER = { '': 99, 'Sunday': 0, 'Monday': 1, 'Tuesday': 2, 'Wednesday': 3, 'Thursday': 4, 'Friday': 5, 'Saturday': 6 };

const TOWN_CLASSES = {
  'israel': 'town-israel',
  'monsey': 'town-monsey',
  'brooklyn': 'town-brooklyn',
  'lakewood towns': 'town-lakewood',
  'lakewood': 'town-lakewood',
  'online': 'town-online',
  'williamsburg': 'town-williamsburg',
  'chicago': 'town-chicago',
  'five towns': 'town-five-towns',
  'new jersey': 'town-new-jersey',
  'florida': 'town-florida',
  'houston, tx': 'town-houston',
  'houston': 'town-houston',
  'crown heights': 'town-crown-heights',
};

const FELLOWSHIP_CLASSES = {
  'sa': 'fell-sa',
  'aa': 'fell-aa',
  'na': 'fell-na',
  'ga': 'fell-ga',
  'al-anon': 'fell-alanon',
  'al-anon jewish': 'fell-alanon',
  'aca': 'fell-aca',
  'tlr': 'fell-tlr',
  'recovery': 'fell-recovery',
  's-anon': 'fell-sanon',
  'ma': 'fell-ma',
  'saa': 'fell-saa',
  'alateen': 'fell-alateen',
  'aa / na': 'fell-aa',
};

function handleSheetData(json) {
  try {
    allMeetings = json.table.rows.map(row => {
      const c = row.c || [];
      const val = i => {
        if (!c[i]) return '';
        if (c[i].f) return String(c[i].f).trim();
        if (c[i].v != null) return String(c[i].v).trim();
        return '';
      };
      return {
        title: val(0),
        town: val(1),
        fellowship: val(2),
        day: val(3),
        time: val(4),
        type: val(5),
        address: val(6),
        link: val(7),
        contact: val(8),
        notes: val(9)
      };
    }).filter(m => m.title);

    populateDropdowns();
    filteredMeetings = [...allMeetings];
    sortAndRender();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('meetingTable').style.display = '';
  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#c00">Failed to load meetings. Please refresh or try again later.</div>';
    console.error('Sheet load error:', err);
  }
}

function loadMeetings() {
  window.google = window.google || {};
  window.google.visualization = window.google.visualization || {};
  window.google.visualization.Query = window.google.visualization.Query || {};
  window.google.visualization.Query.setResponse = handleSheetData;

  const script = document.createElement('script');
  script.src = SHEET_URL;
  script.onerror = function() {
    document.getElementById('loading').innerHTML =
      '<div style="color:#c00">Failed to load meetings. Please refresh or try again later.</div>';
  };
  document.head.appendChild(script);
}

function populateDropdowns() {
  const towns = [...new Set(allMeetings.map(m => m.town).filter(Boolean))].sort();
  const fellowships = [...new Set(allMeetings.map(m => m.fellowship).filter(Boolean))].sort();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
    .filter(d => allMeetings.some(m => m.day === d));

  fillSelect('filterTown', towns, 'All Towns');
  fillSelect('filterFellowship', fellowships, 'All Fellowships');
  fillSelect('filterDay', days, 'All Days');
}

function fillSelect(id, items, placeholder) {
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    items.map(i => `<option value="${esc(i)}">${esc(i)}</option>`).join('');
}

function getSelectedValues(selectId) {
  const sel = document.getElementById(selectId);
  const values = [];
  for (const opt of sel.selectedOptions) {
    if (opt.value) values.push(opt.value);
  }
  return values;
}

function applyFilters() {
  const towns = getSelectedValues('filterTown');
  const fellowships = getSelectedValues('filterFellowship');
  const days = getSelectedValues('filterDay');

  filteredMeetings = allMeetings.filter(m => {
    if (towns.length && !towns.some(t => m.town.toLowerCase().includes(t.toLowerCase()))) return false;
    if (fellowships.length && !fellowships.includes(m.fellowship)) return false;
    if (days.length && !days.includes(m.day)) return false;
    return true;
  });

  sortAndRender();
}

function clearFilters() {
  ['filterTown', 'filterFellowship', 'filterDay'].forEach(id => {
    const sel = document.getElementById(id);
    for (const opt of sel.options) opt.selected = false;
    sel.options[0].selected = true;
  });
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  filteredMeetings = [...allMeetings];
  sortAndRender();
}

function sortAndRender() {
  filteredMeetings.sort((a, b) => {
    let va, vb;
    if (currentSort === 'day') {
      va = DAY_ORDER[a.day] ?? 99;
      vb = DAY_ORDER[b.day] ?? 99;
    } else {
      va = (a[currentSort] || '').toLowerCase();
      vb = (b[currentSort] || '').toLowerCase();
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    const base = th.dataset.sort === 'title' ? 'TITLE' :
                 th.dataset.sort === 'town' ? 'TOWN' :
                 th.dataset.sort === 'fellowship' ? 'FELLOWSHIP' :
                 th.dataset.sort === 'day' ? 'DAY' : 'TYPE';
    th.innerHTML = th.dataset.sort === currentSort
      ? `${base} ${sortAsc ? '&#x2193;' : '&#x2191;'}`
      : base;
  });

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('meetingBody');
  const cards = document.getElementById('mobileCards');

  document.getElementById('resultCount').textContent =
    `Showing ${filteredMeetings.length} meeting${filteredMeetings.length !== 1 ? 's' : ''}`;

  tbody.innerHTML = filteredMeetings.map((m, i) => `
    <tr>
      <td class="title-cell">${esc(m.title)}</td>
      <td>${townBadge(m.town)}</td>
      <td>${fellowshipBadge(m.fellowship)}</td>
      <td>${esc(m.day)}</td>
      <td class="type-text">${esc(m.type)}</td>
      <td><button class="details-btn" onclick="openModal(${i})"><svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><text x="10" y="14.5" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">i</text></svg>Details</button></td>
    </tr>
  `).join('');

  cards.innerHTML = filteredMeetings.map((m, i) => `
    <div class="meeting-card" onclick="openModal(${i})">
      <div class="card-title">${esc(m.title)}</div>
      <div class="card-row">
        ${townBadge(m.town)}
        ${fellowshipBadge(m.fellowship)}
      </div>
      <div class="card-row">
        ${m.day ? `<span class="card-day">${esc(m.day)}</span>` : ''}
        ${m.time ? `<span class="card-time">${esc(m.time)}</span>` : ''}
      </div>
      ${m.type ? `<div class="card-type">${esc(m.type)}</div>` : ''}
      <button class="card-details-btn" onclick="event.stopPropagation();openModal(${i})">
        <svg viewBox="0 0 20 20" width="13" height="13"><circle cx="10" cy="10" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><text x="10" y="14.5" text-anchor="middle" font-size="12" font-weight="bold" fill="currentColor">i</text></svg>
        Details
      </button>
    </div>
  `).join('');
}

function townBadge(town) {
  if (!town) return '';
  const cls = TOWN_CLASSES[town.toLowerCase()] || 'town-default';
  return `<span class="town-badge ${cls}">${esc(town)}</span>`;
}

function fellowshipBadge(fellowship) {
  if (!fellowship) return '';
  const cls = FELLOWSHIP_CLASSES[fellowship.toLowerCase()] || 'fell-default';
  return `<span class="fellowship-badge ${cls}">${esc(fellowship)}</span>`;
}

function openModal(index) {
  const m = filteredMeetings[index];
  document.getElementById('modalTitle').textContent = m.title;

  let html = '';

  const field = (label, value) => {
    if (!value) return '';
    return `<div class="modal-field"><div class="modal-label">${label}</div><div class="modal-value">${value}</div></div>`;
  };

  html += field('Town', esc(m.town));
  html += field('Fellowship', esc(m.fellowship));
  html += field('Day', esc(m.day));
  html += field('Time', esc(m.time));
  html += field('Meeting Type', esc(m.type));

  if (m.address) {
    const mapLink = `https://maps.google.com/?q=${encodeURIComponent(m.address)}`;
    html += field('Address', `<a href="${mapLink}" target="_blank" rel="noopener">${esc(m.address)}</a>`);
  }

  if (m.link) {
    const href = m.link.startsWith('http') ? m.link : 'https://' + m.link;
    html += field('Meeting Link', `<a href="${esc(href)}" target="_blank" rel="noopener">${esc(m.link)}</a>`);
  }

  if (m.contact) {
    let contactHtml = esc(m.contact);
    if (/^\d[\d\s()\-]+$/.test(m.contact.trim())) {
      contactHtml = `<a href="tel:${m.contact.replace(/\D/g,'')}">${esc(m.contact)}</a>`;
    } else if (m.contact.includes('@')) {
      contactHtml = `<a href="mailto:${esc(m.contact)}">${esc(m.contact)}</a>`;
    }
    html += field('Contact', contactHtml);
  }

  html += field('Notes', esc(m.notes));

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.classList.add('modal-open');
  document.getElementById('modalOverlay').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.classList.remove('modal-open');
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Quick filter buttons
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const isActive = btn.classList.contains('active');
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));

    const townSel = document.getElementById('filterTown');
    for (const opt of townSel.options) opt.selected = false;

    if (!isActive) {
      btn.classList.add('active');
      const town = btn.dataset.town;
      for (const opt of townSel.options) {
        if (opt.value.toLowerCase().includes(town.toLowerCase())) opt.selected = true;
      }
    } else {
      townSel.options[0].selected = true;
    }
    applyFilters();
  });
});

// Sort dropdown
document.getElementById('sortSelect').addEventListener('change', function() {
  currentSort = this.value;
  sortAsc = true;
  sortAndRender();
});

// Sort by clicking table headers
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const sort = th.dataset.sort;
    if (currentSort === sort) {
      sortAsc = !sortAsc;
    } else {
      currentSort = sort;
      sortAsc = true;
    }
    document.getElementById('sortSelect').value = sort;
    sortAndRender();
  });
});

// Close modal
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Load
loadMeetings();
</script>
</body>
</html>
